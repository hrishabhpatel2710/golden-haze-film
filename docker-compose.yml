services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${APP_PORT:-8080}
      CRAFT_DB_SSL_CA: /var/www/html/docker/certs/ca.pem
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ./storage:/var/www/html/storage
      - ./web/cpresources:/var/www/html/web/cpresources
