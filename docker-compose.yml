services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CRAFT_DB_SSL_CA: /var/www/html/docker/certs/ca.pem
    volumes:
      - ./storage:/var/www/html/storage
      - ./web/cpresources:/var/www/html/web/cpresources
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/html/web:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
